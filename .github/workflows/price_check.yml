name: 価格監視チェック

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 価格履歴を復元
        uses: actions/cache@v4
        with:
          path: prices.json
          key: prices-cache-${{ github.run_id }}
          restore-keys: |
            prices-cache-

      - name: 価格チェック実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python checker.py

      - name: 価格履歴を保存
        uses: actions/cache/save@v4
        if: always()
        with:
          path: prices.json
          key: prices-cache-${{ github.run_id }}
